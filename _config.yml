# =============================================
# مدونة محمد اجليوط | Blog de Mhamed Jliouat
# =============================================

title: "محمد اجليوط"
description: "مقالات و كتابات محمد اجليوط"
author: "محمد اجليوط"
lang: ar
direction: rtl

# GitHub Pages
baseurl: ""
url: "https://mhamedjliouat.com"

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/

# Collections
collections:
  posts:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
