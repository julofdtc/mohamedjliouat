<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-title">
      <span class="site-title-icon">✦</span>
      {{ site.title }}
    </a>
    <div class="header-actions">
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>الرئيسية</a>
        <a href="{{ '/about' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>من أنا</a>
      </nav>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="تبديل الوضع الليلي">
        <span class="icon-moon">🌙</span>
        <span class="icon-sun">☀️</span>
      </button>
    </div>
  </div>
</header>
